[build]
  command = "npm run build --prefix frontend"
  publish = "frontend/build"

[context.production.environment]
  NODE_VERSION = "18"

[dev]
  command = "npm start --prefix frontend"[build]
  base = "frontend"
  command = "npm run build"
  publish = "build"

[build.environment]
  CI = "false"

[[redirects]]
  from = "/api/*"
  to = "https://web-production-c09f1.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200