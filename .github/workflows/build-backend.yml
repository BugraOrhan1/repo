name: Build & Validate Backend

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies (deploy requirements)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-deploy.txt

      - name: Lint / Quick checks
        working-directory: backend
        run: |
          python -c "print('Backend packages installed')"

      - name: Notice for Railway
        run: |
          echo "Build succeeded. To deploy, connect this GitHub repo to Railway and set environment variables: MONGO_URL, DB_NAME, JWT_SECRET, CORS_ORIGINS."
